version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: yoyzie_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: yoyzie_user
      POSTGRES_PASSWORD: yoyzie_dev_pass
      POSTGRES_DB: yoyzie_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: yoyzie_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
